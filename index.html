<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 1</title>

    <style>
        body{
            background: radial-gradient(circle, #3b2f2f, #1a1414);
            color: #f5deb3;
            font-family: 'Courier New', Courier, monospace;
        }

        /* this face was made for RAIDO*/
        .radio-box{
            background: linear-gradient(145deg, #5c3a21, #2d1b12);
            border: 8px solid #3a2415;
            border-radius: 25px;
            box-shadow: inset 0 0 20px black, 0 0 30px black;
            padding: 30px;
        }

        /* VOX */
        .screen{
            background: #1a1a1a;
            color: #00ff9c;
            border-radius: 15px;
            padding: 15px;
            box-shadow: inset 0 0 15px #00ff9c;
            text-align: center;
        }

        /* knock before you turn the knob */
        .radio-btn{
            background: radial-gradient(circle, #d4af37, #8b6f2f);
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            color: black;
            font-weight: bold;
            box-shadow: 0 4px #5a4a1f;
        }

        .radio-btn:active{
            transform: translateY(2px);
            box-shadow: 0 2px #5a4a1f;
        }

        input{
            background: #2b2b2b !important;
            color: #fff !important;
            border: 1px solid #d4af37 !important;
        }

        h3{
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
    
</head>
<body>
    
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="radio-box w-75 text-center">

            <h3>Electricity Broadcast Unit</h3>

            <div class="screen mt-3">
                <h2 id="kWh">kWh Analyzer</h2>
                <p id="result">Awaiting input...</p>
            </div>

            <input type="text" class="form-control mt-3" id="consumption" placeholder="Enter kWh usage">

            <button type="button" class="radio-btn mt-3" onclick="check_class()">
                Tune Signal
            </button>

        </div>
    </div>

    <script>
        function check_class(){
        
            var checker = parseFloat(document.getElementById("consumption").value);
            var message = "";

            if (isNaN(checker) || checker < 0) {
                message = "Invalid signal detected. Enter a valid id.";
            }

            else if (checker <= 100) {
                message = "Lifeline Consumer\n Lowest rates\n Est. Cost: ₱500 - ₱800\nTip: You're very good.";
            }
            
            else if (checker <= 200) {
                message = "Low Consumption\n Normal rate\n Est. Cost: ₱800 - ₱1500\nTip: Try unplugging idle devices.";
            }
        
            else if (checker <= 300) {
                message = "Average Consumption\n Typical usage\n Est. Cost: ₱1500 - ₱2500\nTip: Use energy-saving appliances.";
            }
            
            else if (checker <= 500) {
                message = "High Consumption\n Higher bills incoming\n Est. Cost: ₱2500 - ₱4000\nTip: Limit AC usage.";
            }
        
            else {
                message = "Very High Consumption\n Heavy usage detected\n Est. Cost: ₱4000+\nTip: Check for power-hungry politicians.";
            }

            document.getElementById("result").innerText = message;
        }
    </script>
    
</body>
</html>
